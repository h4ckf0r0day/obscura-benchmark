<!doctype html>
<html lang="ja">
<head><meta charset="shift_jis"><title>Shift_JIS</title></head>
<body>
  <!-- This file is stored as raw Shift_JIS bytes. obscura meta-sniffs the
       declared charset and decodes the body correctly. A naive UTF-8-only
       reader produces mojibake here. -->
  <p id="jp">こんにちは世界</p>
  <script>
    (function () {
      var el = document.getElementById("jp");
      window.__obstacle = "sjis:" + (el ? el.textContent : "none");
    })();
  </script>
</body>
</html>
