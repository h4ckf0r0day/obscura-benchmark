<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>Extraction: Links</title></head>
<body>
  <main>
    <h1>Link Harvesting</h1>
    <p>Obscura collects every anchor href from the rendered page.</p>
    <ul>
      <li><a href="https://example.com/docs">Documentation</a></li>
      <li><a href="https://example.com/pricing">Pricing</a></li>
      <li><a href="https://example.org/blog/post-1">First Blog Post</a></li>
      <li><a href="https://news.example.net/article?id=42">News Article</a></li>
    </ul>
  </main>
  <!-- links dump should list each absolute href. Absolute URLs used so output is port-independent. -->
</body>
</html>
