<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>IntersectionObserver Infinite Scroll</title></head>
<body>
  <div id="feed"></div>
  <div id="sentinel"></div>
  <!-- Infinite-scroll / lazy-load pattern: an IntersectionObserver watches a
       sentinel at the end of the feed. Each time the sentinel intersects the
       viewport, a batch of items is appended and a new sentinel observed. This
       is the core Next.js / React feed loading pattern. Headless tools without a
       real layout/observer pipeline never fire the callback and load 0 items.
       obscura treats observed targets as intersecting so the callback fires. -->
  <script>
    (function () {
      var feed = document.getElementById('feed');
      var loaded = 0;
      var BATCH = 10;
      var MAX = 50;

      function appendBatch() {
        for (var i = 0; i < BATCH; i++) {
          var card = document.createElement('div');
          card.className = 'card';
          card.textContent = 'Item ' + loaded;
          feed.appendChild(card);
          loaded++;
        }
      }

      var io = new IntersectionObserver(function (entries) {
        for (var i = 0; i < entries.length; i++) {
          if (entries[i].isIntersecting && loaded < MAX) {
            appendBatch();
            if (loaded >= MAX) {
              io.disconnect();
              window.__obstacle = 'io:' + feed.querySelectorAll('.card').length;
            }
          }
        }
      });

      io.observe(document.getElementById('sentinel'));
    })();
  </script>
</body>
</html>
